services:
  - type: web
    name: wharfintel-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l 3000
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://wharfintel-backend.onrender.com
    routes:
      - path: /
        handleCors: false

  - type: web
    name: wharfintel-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: WHARF_PEPPER
        value: CyberSec@WharfIntel2026!Pepper

  - type: pserv
    name: wharfintel-db
    plan: free
    version: 15
